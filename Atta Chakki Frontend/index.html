<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apni Chakki</title>
    <!-- Leaflet CSS for map in checkout -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin="" />
    <!-- Dynamic Favicon is set via App.jsx -->
    <style>
      /* Contain Leaflet map z-index so it doesn't overlay fixed banners/footer */
      .leaflet-container {
        z-index: 0 !important;
        isolation: isolate;
      }
      .leaflet-top,
      .leaflet-bottom {
        z-index: 1000 !important;
      }

      /* CRITICAL: Tailwind resets img { max-width:100%; height:auto } which
         breaks Leaflet tile sizing (tiles must be exactly 256x256px).
         These overrides undo Tailwind's reset inside the map. */
      .leaflet-container img.leaflet-tile,
      .leaflet-container img.leaflet-marker-icon,
      .leaflet-container img.leaflet-marker-shadow,
      .leaflet-container img.leaflet-image-layer {
        max-width: none !important;
        max-height: none !important;
        width: auto;
        height: auto;
        padding: 0;
        margin: 0;
      }
      .leaflet-container img {
        max-width: none !important;
        max-height: none !important;
      }
      .leaflet-tile-pane {
        opacity: 1;
      }
      .leaflet-tile {
        filter: inherit;
        visibility: inherit;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
