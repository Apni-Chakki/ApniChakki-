<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apni Chakki</title>
    <!-- Leaflet CSS for map in checkout -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin="" />
    <!-- Dynamic Favicon is set via App.jsx -->
    <style>
      /* Hide the Google Translate top bar frame */
      .skiptranslate iframe {
        display: none !important;
      }
      body {
        top: 0px !important;
      }
      /* Hide the Google Translate banner */
      .goog-te-banner-frame.skiptranslate {
        display: none !important;
      }
      /* 
        IMPORTANT: Do NOT use display:none on #google_translate_element!
        That prevents the widget from initializing.
        Instead, push it off-screen so it renders but stays invisible.
      */
      #google_translate_element {
        position: fixed;
        top: -9999px;
        left: -9999px;
        opacity: 0;
        pointer-events: none;
        z-index: -1;
      }
      .goog-te-menu-frame {
        box-shadow: none !important;
      }

      /* Contain Leaflet map z-index so it doesn't overlay fixed banners/footer */
      .leaflet-container {
        z-index: 0 !important;
        isolation: isolate;
      }
      .leaflet-top,
      .leaflet-bottom {
        z-index: 1000 !important;
      }

      /* CRITICAL: Tailwind resets img { max-width:100%; height:auto } which
         breaks Leaflet tile sizing (tiles must be exactly 256x256px).
         These overrides undo Tailwind's reset inside the map. */
      .leaflet-container img.leaflet-tile,
      .leaflet-container img.leaflet-marker-icon,
      .leaflet-container img.leaflet-marker-shadow,
      .leaflet-container img.leaflet-image-layer {
        max-width: none !important;
        max-height: none !important;
        width: auto;
        height: auto;
        padding: 0;
        margin: 0;
      }
      .leaflet-container img {
        max-width: none !important;
        max-height: none !important;
      }
      .leaflet-tile-pane {
        opacity: 1;
      }
      .leaflet-tile {
        filter: inherit;
        visibility: inherit;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Google Translate Widget Container — off-screen but still renders -->
    <div id="google_translate_element"></div>

    <script type="text/javascript">
      window._googleTranslateReady = false;

      function googleTranslateElementInit() {
        try {
          new google.translate.TranslateElement({
            pageLanguage: 'en',
            includedLanguages: 'en,ur',
            autoDisplay: false,
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE
          }, 'google_translate_element');
          window._googleTranslateReady = true;
          console.log('[GT] Widget initialized');

          // On page load: if user previously chose Urdu, translate automatically
          var savedLang = localStorage.getItem('apni_chakki_lang');
          if (savedLang === 'ur') {
            // Wait for the combo to be created by Google's script
            var attempts = 0;
            var waitForCombo = setInterval(function() {
              attempts++;
              var combo = document.querySelector('.goog-te-combo');
              if (combo) {
                clearInterval(waitForCombo);
                combo.value = 'ur';
                combo.dispatchEvent(new Event('change'));
                console.log('[GT] Auto-translated to Urdu on page load');
              } else if (attempts > 20) {
                clearInterval(waitForCombo);
                console.warn('[GT] Combo not found after init, trying cookie');
                document.cookie = 'googtrans=/en/ur; path=/;';
              }
            }, 300);
          }
        } catch (e) {
          console.warn('[GT] Init error:', e);
        }
      }

      /**
       * Switch Google Translate language — called from React LanguageToggle.
       * @param {string} lang - 'en' or 'ur'
       */
      window.switchGoogleTranslate = function(lang) {
        console.log('[GT] switchGoogleTranslate called with:', lang);

        function doSwitch() {
          var combo = document.querySelector('.goog-te-combo');
          
          if (lang === 'en') {
            // === SWITCH BACK TO ENGLISH ===
            
            // Clear googtrans cookies on all possible domain variants
            var paths = ['/', ''];
            var domains = ['', window.location.hostname, '.' + window.location.hostname, 'localhost', '.localhost'];
            for (var p = 0; p < paths.length; p++) {
              for (var d = 0; d < domains.length; d++) {
                var domPart = domains[d] ? '; domain=' + domains[d] : '';
                document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=' + (paths[p] || '/') + domPart;
              }
            }

            if (combo) {
              // Set combo to empty string which resets to original language
              combo.value = '';
              combo.dispatchEvent(new Event('change'));
              console.log('[GT] Reset to English via combo');
              
              // Check if it actually reset. If not, reload.
              setTimeout(function() {
                if (document.documentElement.classList.contains('translated-rtl') ||
                    document.documentElement.classList.contains('translated-ltr') ||
                    document.querySelector('html.translated-rtl') ||
                    document.querySelector('html.translated-ltr')) {
                  console.log('[GT] Still translated after combo reset, reloading...');
                  window.location.reload();
                }
              }, 800);
            } else {
              // No combo, just reload without cookies
              console.log('[GT] No combo found, reloading...');
              window.location.reload();
            }
          } else {
            // === SWITCH TO URDU ===
            if (combo) {
              combo.value = 'ur';
              combo.dispatchEvent(new Event('change'));
              console.log('[GT] Switched to Urdu via combo');
            } else {
              // Combo not ready yet — set cookie and reload
              console.log('[GT] Combo not found, setting cookie and reloading...');
              document.cookie = 'googtrans=/en/ur; path=/;';
              document.cookie = 'googtrans=/en/ur; path=/; domain=.' + window.location.hostname;
              window.location.reload();
            }
          }
        }

        // Try immediately, then retry after a short delay if combo isn't ready
        var combo = document.querySelector('.goog-te-combo');
        if (combo) {
          doSwitch();
        } else {
          // Wait for combo to appear
          var retries = 0;
          var waitInterval = setInterval(function() {
            retries++;
            if (document.querySelector('.goog-te-combo') || retries > 10) {
              clearInterval(waitInterval);
              doSwitch();
            }
          }, 300);
        }
      };
    </script>

    <!-- Load Google Translate API -->
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  </body>
</html>
